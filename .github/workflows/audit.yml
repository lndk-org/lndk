name: Security audit

on:
  pull_request:
    paths: 
      - '.github/workflows/audit.yml'
      - '**/Cargo.*'
jobs:
  security_audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit
